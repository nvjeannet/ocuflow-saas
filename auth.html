<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>OcuFlow — Connexion</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    .auth-container{max-width:400px;margin:60px auto;padding:0 20px;}
    .form-group{margin-bottom:20px;}
    input[type=email],input[type=password]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s;}
    input:focus{border-color:var(--accent);}
    .error-msg{color:var(--danger);font-size:.7rem;margin-top:8px;display:none;}
    .success-msg{color:var(--success);font-size:.7rem;margin-top:8px;display:none;}
    .auth-toggle{text-align:center;margin-top:24px;font-size:.75rem;color:var(--muted);}
    .auth-toggle span{color:var(--accent);cursor:pointer;font-weight:600;}
  </style>
</head>
<body>
  <div class="auth-container">
    <header style="text-align:center;margin-bottom:40px;">
      <div class="logo">Ocu<span>Flow</span><div class="logo-slogan">La Gymnastique Oculaire</div></div>
      <p style="color:var(--muted);font-size:.7rem;margin-top:8px;" id="auth-subtitle">Connectez-vous pour sauvegarder vos progrès.</p>
    </header>

    <div class="section" id="auth-section">
      <h2 class="section-title" id="form-title">Connexion</h2>
      
      <form id="auth-form">
        <div class="form-group">
          <label class="control-label" style="display:block;margin-bottom:6px;">Email</label>
          <input type="email" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="form-group" id="pass-group">
          <label class="control-label" style="display:block;margin-bottom:6px;">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width:100%;padding:16px;" id="submit-btn">Se connecter</button>
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>
      </form>

      <div class="auth-toggle" id="auth-toggle-container">
        <p id="toggle-text">Pas encore de compte ? <span id="toggle-auth">Inscrivez-vous</span></p>
        <p style="margin-top:12px;"><span onclick="showForgot()">Mot de passe oublié ?</span></p>
      </div>
    </div>

    <!-- Section Mot de passe oublié -->
    <div class="section" id="forgot-section" style="display:none;">
      <h2 class="section-title">Récupération</h2>
      <p style="color:var(--muted);font-size:0.75rem;margin-bottom:20px;">Entrez votre email pour recevoir un code de réinitialisation.</p>
      <form id="forgot-form">
        <div class="form-group">
          <input type="email" id="forgot-email" placeholder="votre@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Envoyer le code</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:0.75rem;color:var(--accent);cursor:pointer;" onclick="hideForgot()">← Retour</p>
    </div>

    <!-- Section Reset -->
    <div class="section" id="reset-section" style="display:none;">
      <h2 class="section-title">Nouveau mot de passe</h2>
      <form id="reset-form">
        <div class="form-group">
          <label style="display:block;font-size:0.7rem;margin-bottom:4px;">Code à 6 chiffres</label>
          <input type="text" id="reset-token" placeholder="000000" required maxlength="6">
        </div>
        <div class="form-group">
          <label style="display:block;font-size:0.7rem;margin-bottom:4px;">Nouveau mot de passe</label>
          <input type="password" id="new-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Réinitialiser</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="index.html" style="color:var(--muted);font-size:.7rem;text-decoration:none;">← Retour à l'accueil</a>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const API_URL = '/api/auth';
    let isLogin = true;

    function showForgot() {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('forgot-section').style.display = 'block';
    }
    function hideForgot() {
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('forgot-section').style.display = 'none';
    }

    const form = document.getElementById('auth-form');
    const toggleAuth = document.getElementById('toggle-auth');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    toggleAuth.onclick = () => {
      isLogin = !isLogin;
      formTitle.textContent = isLogin ? 'Connexion' : 'Inscription';
      submitBtn.textContent = isLogin ? 'Se connecter' : 'Créer un compte';
      toggleText.innerHTML = isLogin ? 
        'Pas encore de compte ? <span id="toggle-auth">Inscrivez-vous</span>' :
        'Déjà inscrit ? <span id="toggle-auth">Connectez-vous</span>';
      document.getElementById('toggle-auth').onclick = toggleAuth.onclick;
      errorMsg.style.display = 'none';
    };

    form.onsubmit = async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const endpoint = isLogin ? '/login' : '/register';
      try {
        const res = await fetch(API_URL + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        if (isLogin) {
          localStorage.setItem('ocuflow_token', data.token);
          localStorage.setItem('ocuflow_user', JSON.stringify(data.user));
          successMsg.textContent = 'Connexion réussie !';
          successMsg.style.display = 'block';
          
          // Redirection basée sur le rôle
          const target = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
          setTimeout(() => window.location.href = target, 1000);
        } else {
          successMsg.textContent = 'Bienvenue ! Connectez-vous maintenant.';
          successMsg.style.display = 'block';
          setTimeout(() => toggleAuth.click(), 1500);
        }
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    };

    document.getElementById('forgot-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      try {
        const res = await fetch(API_URL + '/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        alert(data.message);
        document.getElementById('forgot-section').style.display = 'none';
        document.getElementById('reset-section').style.display = 'block';
      } catch(e) { alert("Erreur."); }
    };

    document.getElementById('reset-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      const token = document.getElementById('reset-token').value;
      const newPassword = document.getElementById('new-password').value;
      try {
        const res = await fetch(API_URL + '/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error);
        alert(data.message);
        window.location.reload();
      } catch(e) { alert(e.message); }
    };
  </script>
</body>
</html>
